<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="card"> 
      <div class="image">
        <picture>
          <source media="(max-width: 600px)" srcset="images/image-product-mobile.jpg">
          <img src="images/image-product-desktop.jpg" alt="">
        </picture>
      </div>
      <div class="desc">
        <h6>PERFUME</h6>

        <h1>Gabrielle Essence Eau De Parfum</h1>

        <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</p>

        <div class="price">
          <h1 class="new-price">$149.99</h1>
          <del class="old-price">$169.99</del>
        </div>

        <button>
          <img class="cart"src="./images/icon-cart.svg" alt="">Add to Cart
        </button>
      </div>
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Mithra Xavier</a>.
  </footer>
</body>
</html>
